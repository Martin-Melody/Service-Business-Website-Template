<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore categorized service offerings and pricing with this reusable template." />
  <title>Services | LuxeService</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="site-header"></div>
  <main class="mx-auto max-w-6xl px-4 py-16 md:px-6">
    <p class="text-sm font-semibold uppercase tracking-wider text-teal-700">Services</p>
    <h1 class="mt-2 text-4xl font-bold text-slate-900">Complete service menu and pricing.</h1>
    <p class="mt-4 max-w-3xl text-slate-600">All cards are reusable and can be grouped by category to fit beauty, wellness, clinical, and creative service businesses.</p>

    <section class="mt-10">
      <h2 class="text-xl font-semibold text-slate-900">All Services</h2>
      <div id="services-grid" class="mt-6 grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
    </section>

    <section class="mt-16 rounded-3xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
      <h2 class="text-2xl font-bold text-slate-900">Need a custom package?</h2>
      <p class="mt-3 text-slate-600">Offer bundled appointments for recurring clients and special events.</p>
      <a href="contact.html#booking" class="mt-6 inline-block rounded-full bg-teal-700 px-6 py-3 font-semibold text-white">Request Package</a>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/common.js"></script>
  <script>initLayout('services.html');injectServices('#services-grid');</script>
</body>
</html>
